<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI House Building Map Generator</title>

<meta name="theme-color" content="#1565c0">

<meta name="description"
content="AI House Building Map Generator PWA">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<link rel="icon" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" sizes="512x512" href="icons/icon-512.png">

</head>

<body>

<div id="app">

<header class="top-header">

<div class="logo-area">

<h1>
🏠 AI House Building Map Generator
</h1>

<p>
Design Smart Floor Plans with AI
</p>

</div>

<div class="header-buttons">

<button id="installBtn">
Install App
</button>

<button id="themeBtn">
🌙
</button>

</div>

</header>

<nav class="main-nav">

<button class="nav-btn active">
Dashboard
</button>

<button class="nav-btn">
Projects
</button>

<button class="nav-btn">
Templates
</button>

<button class="nav-btn">
AI Design
</button>

<button class="nav-btn">
Settings
</button>

</nav>

<main class="dashboard">

<section class="welcome-card">

<h2>
Welcome
</h2>

<p>
Create professional residential floor plans using intelligent layout generation.
</p>

</section>

<section class="quick-actions">

<button id="newProject">
➕ New Project
</button>

<button id="openProject">
📂 Open
</button>

<button id="saveProject">
💾 Save
</button>

<button id="shareProject">
📤 Share
</button>

<button id="downloadProject">
⬇ Download
</button>

<button id="deleteProject">
🗑 Delete
</button>

</section>

<section class="project-info">

<h2>
Project Information
</h2>

<div class="grid">

<div class="field">

<label>
Project Name
</label>

<input
type="text"
id="projectName"
placeholder="My Dream House">

</div>

<div class="field">

<label>
Owner Name
</label>

<input
type="text"
id="ownerName"
placeholder="Owner">

</div>

<div class="field">

<label>
City
</label>

<input
type="text"
id="city"
placeholder="City">

</div>

<div class="field">

<label>
Country
</label>

<input
type="text"
id="country"
placeholder="Country">

</div>

</div>

</section>
