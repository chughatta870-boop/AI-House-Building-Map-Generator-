<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI House Building Map Generator</title>

<meta name="theme-color" content="#1565c0">

<meta name="description"
content="AI House Building Map Generator PWA">

<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="style.css">

<link rel="icon" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" sizes="512x512" href="icons/icon-512.png">

</head>

<body>

<div id="app">

<header class="top-header">

<div class="logo-area">

<h1>
🏠 AI House Building Map Generator
</h1>

<p>
Design Smart Floor Plans with AI
</p>

</div>

<div class="header-buttons">

<button id="installBtn">
Install App
</button>

<button id="themeBtn">
🌙
</button>

</div>

</header>

<nav class="main-nav">

<button class="nav-btn active">
Dashboard
</button>

<button class="nav-btn">
Projects
</button>

<button class="nav-btn">
Templates
</button>

<button class="nav-btn">
AI Design
</button>

<button class="nav-btn">
Settings
</button>

</nav>

<main class="dashboard">

<section class="welcome-card">

<h2>
Welcome
</h2>

<p>
Create professional residential floor plans using intelligent layout generation.
</p>

</section>

<section class="quick-actions">

<button id="newProject">
➕ New Project
</button>

<button id="openProject">
📂 Open
</button>

<button id="saveProject">
💾 Save
</button>

<button id="shareProject">
📤 Share
</button>

<button id="downloadProject">
⬇ Download
</button>

<button id="deleteProject">
🗑 Delete
</button>

</section>

<section class="project-info">

<h2>
Project Information
</h2>

<div class="grid">

<div class="field">

<label>
Project Name
</label>

<input
type="text"
id="projectName"
placeholder="My Dream House">

</div>

<div class="field">

<label>
Owner Name
</label>

<input
type="text"
id="ownerName"
placeholder="Owner">

</div>

<div class="field">

<label>
City
</label>

<input
type="text"
id="city"
placeholder="City">

</div>

<div class="field">

<label>
Country
</label>

<input
type="text"
id="country"
placeholder="Country">

</div>

</div>

</section>
<!-- ============================= -->
<!-- Plot Information Section -->
<!-- ============================= -->

<section class="plot-information">

    <h2>📐 Plot Information</h2>

    <div class="grid">

        <div class="field">
            <label for="marla">Plot Size (Marla)</label>
            <input type="number" id="marla" min="1" placeholder="e.g. 5">
        </div>

        <div class="field">
            <label for="length">Length (Feet)</label>
            <input type="number" id="length" min="1" placeholder="e.g. 45">
        </div>

        <div class="field">
            <label for="width">Width (Feet)</label>
            <input type="number" id="width" min="1" placeholder="e.g. 25">
        </div>

        <div class="field">
            <label for="stories">Stories</label>
            <select id="stories">
                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
            </select>
        </div>

        <div class="field">
            <label for="roadWidth">Front Road Width (Feet)</label>
            <input type="number" id="roadWidth" placeholder="30">
        </div>

        <div class="field">
            <label for="frontSpace">Front Open Space</label>
            <input type="number" id="frontSpace" placeholder="5">
        </div>

        <div class="field">
            <label for="backSpace">Back Open Space</label>
            <input type="number" id="backSpace" placeholder="3">
        </div>

        <div class="field">
            <label for="leftSpace">Left Open Space</label>
            <input type="number" id="leftSpace" placeholder="2">
        </div>

        <div class="field">
            <label for="rightSpace">Right Open Space</label>
            <input type="number" id="rightSpace" placeholder="2">
        </div>

    </div>

    <h3>Plot Direction</h3>

    <div class="direction-grid">

        <label><input type="radio" name="direction" value="North" checked> North Facing</label>

        <label><input type="radio" name="direction" value="South"> South Facing</label>

        <label><input type="radio" name="direction" value="East"> East Facing</label>

        <label><input type="radio" name="direction" value="West"> West Facing</label>

    </div>

    <h3>Plot Type</h3>

    <div class="direction-grid">

        <label>
            <input type="checkbox" id="cornerPlot">
            Corner Plot
        </label>

        <label>
            <input type="checkbox" id="commercialFacing">
            Commercial Facing
        </label>

        <label>
            <input type="checkbox" id="parkFacing">
            Park Facing
        </label>

    </div>

  </section>
<!-- ========================================= -->
<!-- HOUSE REQUIREMENTS SECTION -->
<!-- ========================================= -->

<section class="house-requirements">

    <h2>🏠 House Requirements</h2>

    <div class="grid">

        <div class="field">
            <label for="bedrooms">Bedrooms</label>
            <input type="number" id="bedrooms" min="0" value="3">
        </div>

        <div class="field">
            <label for="masterBedrooms">Master Bedrooms</label>
            <input type="number" id="masterBedrooms" min="0" value="1">
        </div>

        <div class="field">
            <label for="kitchens">Kitchens</label>
            <input type="number" id="kitchens" min="0" value="1">
        </div>

        <div class="field">
            <label for="washrooms">Washrooms</label>
            <input type="number" id="washrooms" min="0" value="3">
        </div>

        <div class="field">
            <label for="drawingRooms">Drawing Rooms</label>
            <input type="number" id="drawingRooms" min="0" value="1">
        </div>

        <div class="field">
            <label for="tvLounges">TV Lounges</label>
            <input type="number" id="tvLounges" min="0" value="1">
        </div>

        <div class="field">
            <label for="diningRooms">Dining Rooms</label>
            <input type="number" id="diningRooms" min="0" value="1">
        </div>

        <div class="field">
            <label for="guestRooms">Guest Rooms</label>
            <input type="number" id="guestRooms" min="0">
        </div>

        <div class="field">
            <label for="garage">Garage</label>
            <input type="number" id="garage" min="0" value="1">
        </div>

        <div class="field">
            <label for="garden">Garden</label>
            <input type="number" id="garden" min="0" value="1">
        </div>

        <div class="field">
            <label for="storeRoom">Store Room</label>
            <input type="number" id="storeRoom" min="0">
        </div>

        <div class="field">
            <label for="studyRoom">Study Room</label>
            <input type="number" id="studyRoom" min="0">
        </div>

        <div class="field">
            <label for="prayerRoom">Prayer Room</label>
            <input type="number" id="prayerRoom" min="0">
        </div>

        <div class="field">
            <label for="servantRoom">Servant Room</label>
            <input type="number" id="servantRoom" min="0">
        </div>

        <div class="field">
            <label for="stairs">Stairs</label>
            <input type="number" id="stairs" min="0" value="1">
        </div>

        <div class="field">
            <label for="lift">Lift</label>
            <input type="number" id="lift" min="0">
        </div>

        <div class="field">
            <label for="balcony">Balcony</label>
            <input type="number" id="balcony" min="0">
        </div>

        <div class="field">
            <label for="terrace">Terrace</label>
            <input type="number" id="terrace" min="0" value="1">
        </div>

    </div>

    </section>
<!-- ========================================= -->
<!-- AI DESIGN PANEL -->
<!-- ========================================= -->

<section class="ai-design-panel">

    <h2>🤖 AI House Design Generator</h2>

    <div class="grid">

        <div class="field">
            <label for="designStyle">Design Style</label>
            <select id="designStyle">
                <option value="modern">Modern</option>
                <option value="luxury">Luxury</option>
                <option value="classic">Classic</option>
                <option value="minimal">Minimal</option>
                <option value="contemporary">Contemporary</option>
                <option value="duplex">Duplex</option>
                <option value="villa">Villa</option>
            </select>
        </div>

        <div class="field">
            <label for="constructionType">Construction Type</label>
            <select id="constructionType">
                <option>Residential</option>
                <option>Commercial</option>
                <option>Residential + Commercial</option>
            </select>
        </div>

        <div class="field">
            <label for="viewMode">View Mode</label>
            <select id="viewMode">
                <option>2D Floor Plan</option>
                <option>3D Preview</option>
            </select>
        </div>

        <div class="field">
            <label for="floorSelect">Floor</label>
            <select id="floorSelect">
                <option>Ground Floor</option>
                <option>First Floor</option>
                <option>Second Floor</option>
                <option>Third Floor</option>
                <option>Roof</option>
            </select>
        </div>

    </div>

    <h3>AI Smart Preferences</h3>

    <div class="direction-grid">

        <label>
            <input type="checkbox" id="optimizeRooms" checked>
            Auto Optimize Rooms
        </label>

        <label>
            <input type="checkbox" id="maximizeParking">
            Maximize Parking
        </label>

        <label>
            <input type="checkbox" id="maximizeGarden">
            Large Garden
        </label>

        <label>
            <input type="checkbox" id="naturalLight" checked>
            Natural Light
        </label>

        <label>
            <input type="checkbox" id="crossVentilation" checked>
            Cross Ventilation
        </label>

        <label>
            <input type="checkbox" id="energySaving">
            Energy Efficient
        </label>

        <label>
            <input type="checkbox" id="vastuMode">
            Vastu Mode
        </label>

        <label>
            <input type="checkbox" id="wheelchair">
            Wheelchair Friendly
        </label>

    </div>

    <div class="ai-buttons">

        <button id="generateAI">
            🤖 Generate AI Layout
        </button>

        <button id="regenerateAI">
            🔄 Regenerate
        </button>

        <button id="optimizeAI">
            ✨ Optimize Design
        </button>

        <button id="clearDesign">
            🗑 Clear
        </button>

    </div>

                </section>
